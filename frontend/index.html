<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IncuClipperStudio</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

    <header>

        <h1>INCUCLIPPER STUDIO</h1>

        <span>AI Video Clipper Platform</span>

    </header>

    <main>

        <section class="input-panel">

            <input
                type="text"
                id="videoUrl"
                placeholder="Paste Youtube / TikTok / Instagram URL">

            <button id="startProcess">

                START PROCESS

            </button>

        </section>

        <section class="content">

            <div class="queue">

                <h3>QUEUE</h3>

                <div id="queueList">

                </div>

            </div>

            <div class="output">

                <h3>OUTPUT</h3>

                <div id="outputList">

                </div>

            </div>

        </section>

        <section class="terminal">

<pre id="terminalLog">incuclipper@studio:~$

Waiting input...</pre>

        </section>

    </main>

</div>

<script src="js/app.js"></script>

</body>

</html>
